spring.application.name=ripple
server.port=8081 
# Database
spring.datasource.url=jdbc:mysql://localhost:3306/messaging_app?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto= validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BIT
# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
logging.level.liquibase=DEBUG
logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG

# JWT
jwt.secret=your_secret_key_minimum_32_characters_long
jwt.expiration=86400000